<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Incident Triage Agent</title>
	<link rel="stylesheet" href="/styles.css" />
</head>

<body>
	<main class="app">
		<header class="header">
			<h1>Incident Triage Agent</h1>
			<p>Paste an incident description, logs, or errors.</p>
		</header>

		<section class="controls">
			<label for="incidentId">Incident ID</label>
			<input id="incidentId" type="text" value="test" />
			<button id="newIncidentBtn" type="button">New Incident ID</button>
		</section>

		<section class="overview">
			<div class="overview-card">
				<h2>Incident Overview</h2>

				<div class="overview-row">
					<span class="overview-label">Status</span>
					<span id="incidentStatus" class="status-badge">open</span>
				</div>

				<div class="overview-block">
					<h3>Summary</h3>
					<p id="incidentSummary">No summary yet.</p>
				</div>

				<div class="overview-block">
					<h3>Current hypotheses</h3>
					<ul id="incidentHypotheses" class="overview-list">
						<li>No hypotheses yet.</li>
					</ul>
				</div>
			</div>
		</section>

		<section id="messages" class="messages"></section>

		<form id="chatForm" class="chat-form">
			<textarea id="messageInput" rows="6"
				placeholder="Example: 500 errors spiked right after deployment and logs show repeated timeout errors from the payment service."
				required></textarea>
			<div class="actions">
				<button id="sendBtn" type="submit">Send</button>
			</div>
		</form>
	</main>

	<script src="/app.js"></script>
</body>

</html>
